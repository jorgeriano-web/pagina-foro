<button
  *ngIf="esDialogo"
  type="button"
  class="reserva-cupo-cerrar"
  (click)="cerrarDialogo()"
  aria-label="Cerrar"
>
  ×
</button>

<div class="reserva-cupo-info">
  <p *ngIf="idSala !== null" class="reserva-cupo-sala">Sala {{ idSala }}</p>
  <p *ngIf="nombreExperiencia" class="reserva-cupo-experiencia">{{ nombreExperiencia }}</p>
</div>

<form class="reserva-cupo-form">
  <div class="reserva-cupo-field">
    <label for="nombre">Nombre Completo</label>
    <input type="text" id="nombre" name="nombre" autocomplete="name" [(ngModel)]="nombre" />
  </div>
  <div class="reserva-cupo-field">
    <label for="cedula">Cédula</label>
    <input
      type="text"
      id="cedula"
      name="cedula"
      autocomplete="off"
      inputmode="numeric"
      [(ngModel)]="numDoc"
    />
  </div>
</form>
<button type="button" class="reserva-cupo-submit" (click)="reservaCupo()">Reservar Cupo</button>
